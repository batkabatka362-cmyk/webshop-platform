# ═══════════════════════════════════════════════
# WEBSHOP — docker-compose.yml (Development)
# ═══════════════════════════════════════════════
# Usage: docker-compose up -d

version: '3.9'

services:

  # ── WEBSHOP API ──────────────────────────────
  webshop-api:
    build:
      context: .
      target:  builder          # use builder stage in dev
    ports:
      - "4000:4000"
    env_file:
      - .env.development
    environment:
      - NODE_ENV=development
    volumes:
      - ./backend:/app/backend  # hot reload in dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - webshop-net

  # ── PostgreSQL ───────────────────────────────
  postgres:
    image:    postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER:     webshop_user
      POSTGRES_PASSWORD: webshop_dev_password
      POSTGRES_DB:       webshop_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U webshop_user -d webshop_db"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - webshop-net

  # ── Redis ────────────────────────────────────
  redis:
    image:   redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - webshop-net

  # ── Nginx (Reverse Proxy) ────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - webshop-api
    networks:
      - webshop-net

  # ── PgAdmin (Dev only) ───────────────────────
  pgadmin:
    image:    dpage/pgadmin4
    profiles: ["dev-tools"]
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@webshop.mn
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    networks:
      - webshop-net

volumes:
  postgres_data:
  redis_data:

networks:
  webshop-net:
    driver: bridge
